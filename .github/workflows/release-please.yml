name: release-please

# Canonical release-please workflow.
#
# On every push to main, run googleapis/release-please-action. It scans
# Conventional-Commit messages since the last release tag and:
#
#   - If new fix:/feat:/etc. commits are present, opens or updates a
#     "release PR" that bumps every file registered in extra-files (see
#     release-please-config.json) and updates CHANGELOG.md.
#   - When that release PR merges, the action creates a `v<VERSION>` tag
#     and a GitHub Release populated from the CHANGELOG section.
#
# When the release PR merges, this workflow runs again, release_created
# becomes true, and the `publish` job runs:
#   - npm publish (with provenance)
#   - Build .mcpb bundle + .skill archive
#   - Publish to modelcontextprotocol/registry via OIDC
#   - Conditionally publish skill to ClawHub
#   - Attach .skill + .mcpb to the GitHub Release
#
# RELEASE_PAT (not GITHUB_TOKEN) is used so the release PR's `opened`
# event triggers downstream workflows (CI, pr-auto-review).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Dedupe entries in CHANGELOG.md. With merge-commit (no-squash)
      # workflows, the merge commit's body holds the PR title (via
      # `merge_commit_message: PR_TITLE`), and conventional-commits-parser
      # walks bodies — so the source commit AND the merge commit both
      # show up as the same `fix:`/`feat:` entry. GitHub's valid
      # merge-setting combos can't avoid this, and release-please has
      # no flag to ignore merge commits. So we dedupe after the fact:
      # within each release section in CHANGELOG.md, drop bullet lines
      # whose text (minus the trailing `([hash](url))`) matches an
      # earlier line in the same section.
      - name: Checkout release PR branch
        if: steps.release.outputs.pr != ''
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_PAT }}

      - name: Dedupe CHANGELOG entries
        if: steps.release.outputs.pr != ''
        run: |
          python3 - <<'PY'
          import pathlib, re

          path = pathlib.Path("CHANGELOG.md")
          lines = path.read_text().splitlines(keepends=True)
          # Strip the trailing `([hash](url))` to get the dedup key.
          hash_link = re.compile(r" \(\[[0-9a-f]+\]\([^)]+\)\)$")
          out, seen, in_section = [], set(), False
          for line in lines:
              if line.startswith("## ["):
                  in_section = True
                  seen = set()
                  out.append(line)
                  continue
              if in_section and line.startswith("* "):
                  key = hash_link.sub("", line.rstrip("\n"))
                  if key in seen:
                      continue
                  seen.add(key)
              out.append(line)
          path.write_text("".join(out))
          PY

          if git diff --quiet CHANGELOG.md; then
            echo "No duplicates to dedupe."
            exit 0
          fi
          PR_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # [skip ci] avoids re-triggering CI on this housekeeping commit;
          # the release PR has already had CI green from the release-please
          # commit it lives alongside.
          git commit -m "chore(changelog): dedupe entries [skip ci]"
          git push origin "$PR_BRANCH"

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Set VERSION env
        run: echo "VERSION=${{ needs.release-please.outputs.version }}" >> "$GITHUB_ENV"

      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          skill_name = "zillow-mcp"
          out = pathlib.Path(f"{skill_name}-{version}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      - name: Build .mcpb bundle
        run: |
          npx @anthropic-ai/mcpb pack
          mv zillow-mcp.mcpb "zillow-mcp-${VERSION}.mcpb"

      # Idempotent: skip if this version is already on the registry.
      - name: Publish to npm
        run: |
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "npm already has ${PKG}@${VERSION} — skipping publish."
            exit 0
          fi
          npm publish --access public --provenance

      # ─── modelcontextprotocol/registry (PulseMCP auto-ingests weekly) ───
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # ─── ClawHub (OpenClaw skill registry) — conditional on CLAWHUB_TOKEN ───
      - name: Publish skill to ClawHub
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          if [ ! -f SKILL.md ]; then
            echo "SKILL.md not present — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          SKILL_DIR=$(mktemp -d)
          cp SKILL.md "$SKILL_DIR/"
          npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug zillow-mcp

      # release-please already created the GitHub Release with CHANGELOG
      # content; just attach the build artifacts. --clobber so re-running
      # the workflow on the same tag overwrites prior uploads.
      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "zillow-mcp-${VERSION}.skill" \
            "zillow-mcp-${VERSION}.mcpb" \
            --clobber
